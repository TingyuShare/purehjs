<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 Tool</title>
    <link rel="stylesheet" href="../base.css">
</head>
<body>
    <a class="back-link" href="../index.html">← Back</a>
    <div class="main">
        <h1>Base64 Encoder / Decoder</h1>
        <p class="subtitle">Encode text to Base64 or decode Base64 to text</p>
        <div class="toolbar">
            <button id="encode-btn" class="tool-btn primary">Encode →</button>
            <button id="decode-btn" class="tool-btn primary">← Decode</button>
            <button id="clear-btn" class="tool-btn">Clear</button>
        </div>
        <div class="input-group">
            <div class="input-half">
                <label>Input</label>
                <textarea id="input" placeholder="Enter text or Base64..."></textarea>
            </div>
            <div class="input-half">
                <label>Output <button class="copy-btn" onclick="copyOutput()">Copy</button></label>
                <div class="output-panel" id="output"><span class="empty-state">Result will appear here</span></div>
            </div>
        </div>
        <div id="status"></div>
    </div>
    <footer><p>Made with ❤️ by xiuzhi. <a href="https://ko-fi.com/xiuzhi" target="_blank">Buy me a coffee ☕️</a></p></footer>
    <script src="../theme.js"></script>
    <script src="script.js"></script>
</body>
</html>
