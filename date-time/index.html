<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date-Time Converter</title>
    <link rel="stylesheet" href="../base.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;color:#58a6ff;text-decoration:none;border-bottom:1px solid #21262d;background:#161b22;position:fixed;top:0;left:0;z-index:100;transition:background .2s" onmouseover="this.style.background='#1c2333'" onmouseout="this.style.background='#161b22'">← Back</a>
    <h1>Date-Time Converter</h1>
    <div class="input-container">
        <input type="text" id="date-input" placeholder="Enter a date, timestamp, or leave blank for 'now'">
        <button id="now-btn">Now</button>
    </div>
    <div id="output-container">
        <!-- Results will be dynamically inserted here -->
    </div>
