<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;color:#58a6ff;text-decoration:none;border-bottom:1px solid #21262d;background:#161b22;position:fixed;top:0;left:0;z-index:100;transition:background .2s" onmouseover="this.style.background='#1c2333'" onmouseout="this.style.background='#161b22'">← Back</a>
    <div class="main-container">
        <div class="sidebar">
            <div class="input-container">
                <input type="text" id="m3u-url" placeholder="Enter M3U URL">
                <button id="load-btn">Load</button>
            </div>
            <div class="search-container">
                <input type="search" id="search-channel-input" placeholder="Search channels...">
            </div>
            <div class="channel-container">
                <select id="channel-list" size="10"></select>
            </div>
        </div>
        <div class="video-container">
            <video id="video-player" controls></video>
        </div>
    </div>
    <script src="../theme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="app.js"></script>
</body>
</html>
