<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Compare Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../index.html" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;color:#58a6ff;text-decoration:none;border-bottom:1px solid #21262d;background:#161b22;position:fixed;top:0;left:0;z-index:100;transition:background .2s" onmouseover="this.style.background='#1c2333'" onmouseout="this.style.background='#161b22'">← Back</a>
    <h1>Text Compare Tool</h1>
    <p class="subtitle">Unified diff — left text is baseline</p>
    <div class="toolbar">
        <button id="swap-btn" class="tool-btn" title="Swap texts">⇄ Swap</button>
        <button id="clear-btn" class="tool-btn" title="Clear all">✕ Clear</button>
    </div>
    <div class="container">
        <div class="text-input">
            <h2>Baseline</h2>
            <textarea id="text1" placeholder="Paste baseline text here..."></textarea>
        </div>
        <div class="text-input">
            <h2>Compare</h2>
            <textarea id="text2" placeholder="Paste text to compare..."></textarea>
        </div>
    </div>
    <div class="diff-container">
        <div id="diff-output"></div>
    </div>
    <footer>
        <p>
            Made with ❤️ by xiuzhi.
            <a href="https://ko-fi.com/xiuzhi" target="_blank" rel="noopener noreferrer">Buy me a coffee ☕️</a>
        </p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
